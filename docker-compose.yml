services:
  polymarket-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-public.ecr.aws/supabase/postgres-meta:v0.93.1}
    image: polymarket-l2-api:latest
    container_name: polymarket-l2-api
    env_file:
      - .env
    environment:
      POLYMARKET_PROXY_URL: "http://127.0.0.1:10077"
      HTTP_PROXY: "http://127.0.0.1:10077"
      HTTPS_PROXY: "http://127.0.0.1:10077"
      POLYMARKET_REQUEST_TIMEOUT_MS: "30000"
      MCPORTER_CALL_TIMEOUT: "30000"
      ENABLE_LOCAL_PROXY_FORWARD: "1"
      HOST_PROXY_TARGET: "host.docker.internal:10077"
    volumes:
      - ./.env:/app/.env:ro
      - ./src:/app/src:ro
      - ./MCP_TOOL_VALIDATION.md:/app/MCP_TOOL_VALIDATION.md
      - ./audit:/app/audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    command: ["node", "./bin/pm_mcp_stdio.mjs"]
    healthcheck:
      disable: true

  polymarket-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-public.ecr.aws/supabase/postgres-meta:v0.93.1}
    image: polymarket-l2-api:latest
    container_name: polymarket-l2-api-ui
    env_file:
      - .env
    environment:
      POLYMARKET_PROXY_URL: "http://127.0.0.1:10077"
      HTTP_PROXY: "http://127.0.0.1:10077"
      HTTPS_PROXY: "http://127.0.0.1:10077"
      POLYMARKET_REQUEST_TIMEOUT_MS: "30000"
      ENABLE_LOCAL_PROXY_FORWARD: "1"
      HOST_PROXY_TARGET: "host.docker.internal:10077"
      UI_HOST: "0.0.0.0"
      UI_PORT: "17077"
      PM_UI_ENABLE_LIVE_ACTIONS: "${PM_UI_ENABLE_LIVE_ACTIONS:-0}"
    volumes:
      - ./.env:/app/.env:ro
      - ./src:/app/src:ro
      - ./audit:/app/audit
      - ./MCP_TOOL_VALIDATION.md:/app/MCP_TOOL_VALIDATION.md
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:17077:17077"
    command: ["node", "./src/openclaw/polymarket/ui/server.mjs"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:17077/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
